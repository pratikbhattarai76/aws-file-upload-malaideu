- name: Deploy file upload app
  hosts: aws
  become: true

  vars:
    app_name: aws_file_upload_MalaiDeu
    base_path: /home/ubuntu/docker
    app_path: "{{ base_path }}/{{ app_name }}"

  tasks:
    - name: Ensure base docker directory exists
      file:
        path: "{{ base_path }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Ensure app directory exists
      file:
        path: "{{ app_path }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy app code directory
      copy:
        src: ../app/
        dest: "{{ app_path }}/app/"
        owner: ubuntu
        group: ubuntu
        mode: preserve

    - name: Copy the app docker directory
      copy:
        src: ../docker/
        dest: "{{ app_path }}/docker/"
        owner: ubuntu
        group: ubuntu
        mode: preserve

    - name: Run Docker Compose
      command: docker compose -f docker/docker-compose.yml up -d --build
      args:
        chdir: "{{ app_path }}"
